<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Утилізація Коліс</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .result-card {
            background-color: rgba(36, 129, 204, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px dashed var(--tg-theme-button-color);
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        #submit-btn {
            width: 100%;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>📦 Прийом коліс</h2>

    <div class="form-group">
        <label for="diameter">Діаметр колеса (R)</label>
        <select id="diameter" onchange="calculate()">
            <option value="13" data-weight="6.5">R13 (~6.5 кг)</option>
            <option value="14" data-weight="7.5">R14 (~7.5 кг)</option>
            <option value="15" data-weight="8.8">R15 (~8.8 кг)</option>
            <option value="16" data-weight="10.5">R16 (~10.5 кг)</option>
            <option value="17" data-weight="12.0">R17 (~12.0 кг)</option>
            <option value="18" data-weight="13.5">R18 (~13.5 кг)</option>
            <option value="20" data-weight="16.0">R20 (~16.0 кг)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="count">Кількість (шт)</label>
        <input type="number" id="count" value="1" min="1" oninput="calculate()">
    </div>

    <div class="result-card">
        <div class="result-line">
            <span>Вага одного:</span>
            <span id="single-weight">6.5 кг</span>
        </div>
        <div class="result-line" style="font-weight: bold; color: var(--tg-theme-button-color);">
            <span>ЗАГАЛЬНА ВАГА:</span>
            <span id="total-weight">6.5 кг</span>
        </div>
    </div>

    <button id="submit-btn" onclick="sendData()">Зберегти в базу</button>

    <script>
    // 1. Перевірка ініціалізації
    const tg = window.Telegram.WebApp;
    
    // Повідомимо Telegram, що ми готові
    tg.ready();
    tg.expand();

    function sendData() {
        try {
            const diameter = document.getElementById('diameter').value;
            const count = document.getElementById('count').value;
            const totalWeight = document.getElementById('total-weight').innerText;

            const report = `ПРИЙОМ R${diameter} КІЛЬКІСТЬ ${count} ВАГА ${totalWeight.replace(' кг', '')}`;

            // ДІАГНОСТИКА №1: Чи бачить додаток дані?
            alert("Готую до відправки: " + report);

            // Спроба відправити
            tg.sendData(report);

            // ДІАГНОСТИКА №2: Якщо вікно не закрилося, значить sendData зламався
            alert("Спробував відправити. Закриваю додаток...");
            
            tg.close();
        } catch (e) {
            alert("Помилка JavaScript: " + e.message);
        }
    }
</script>
</body>
</html>
