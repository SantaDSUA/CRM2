<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tires CRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h3 { text-align: center; color: #248bcf; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .result { background: #eef7ff; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; border-left: 5px solid #248bcf; text-align: center; }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        button:active { background: #1a6fa3; }
    </style>
</head>
<body>
    <div class="card">
        <h3>📦 Облік шин</h3>
        
        <label>Діаметр (R):</label>
        <select id="diameter" onchange="calculate()">
            <option value="13" data-weight="6.5">R13 (~6.5 кг)</option>
            <option value="14" data-weight="7.5">R14 (~7.5 кг)</option>
            <option value="15" data-weight="8.8">R15 (~8.8 кг)</option>
            <option value="16" data-weight="10.5">R16 (~10.5 кг)</option>
            <option value="17" data-weight="12.0">R17 (~12.0 кг)</option>
            <option value="18" data-weight="13.5">R18 (~13.5 кг)</option>
            <option value="20" data-weight="16.0">R20 (~16.0 кг)</option>
        </select>

        <label>Кількість (шт):</label>
        <input type="number" id="count" value="1" min="1" oninput="calculate()">

        <div class="result">
            ЗАГАЛЬНА ВАГА: <span id="total-weight">6.5</span> кг
        </div>

        <button onclick="sendData()">💾 ЗБЕРЕГТИ В БАЗУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function calculate() {
            const select = document.getElementById('diameter');
            const count = document.getElementById('count').value || 0;
            const weight = select.options[select.selectedIndex].getAttribute('data-weight');
            const total = (weight * count).toFixed(1);
            document.getElementById('total-weight').innerText = total;
        }

        function sendData() {
    const diam = document.getElementById('diameter').value;
    const count = document.getElementById('count').value;
    const weight = document.getElementById('total-weight').innerText;

    // Формуємо рядок даних (точно такий же формат)
    const dataString = `ПРИЙОМ R${diam} КІЛЬКІСТЬ ${count} ВАГА ${weight}`;
    
    // ВІДПРАВЛЯЄМО ДАНІ В БОТ (через вбудований метод WebApp)
    tg.sendData(dataString); 
    
    // Додаток закриється автоматично після sendData
}
    </script>
</body>
</html>
