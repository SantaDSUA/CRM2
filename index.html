<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM ШИНИ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #eee; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #3498db; color: white; }
        .tab.active.sell { background: #e74c3c; }
        #btn-save { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; background: #3498db; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">📦 Облік шин</h2>
    
    <div class="tabs">
        <div id="tab-add" class="tab active" onclick="setMode('ADD')">➕ ПРИХІД</div>
        <div id="tab-sub" class="tab" onclick="setMode('REMOVE')">➖ СПИСАННЯ</div>
    </div>

    <label>Діаметр (R):</label>
    <select id="diameter">
        <option value="R13">R13</option>
        <option value="R14">R14</option>
        <option value="R15">R15</option>
        <option value="R16">R16</option>
        <option value="R17">R17</option>
        <option value="R18">R18</option>
        <option value="R19">R19</option>
        <option value="R20">R20</option>
    </select>

    <label>Кількість (шт):</label>
    <input type="number" id="count" value="1" min="1">

    <div id="weight-section">
        <label>Загальна вага (кг):</label>
        <input type="number" id="weight" step="0.1" placeholder="Введіть вагу">
    </div>

    <button id="btn-save" onclick="sendData()">ЗБЕРЕГТИ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let mode = 'ADD';

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('tab-add').classList.toggle('active', mode === 'ADD');
        document.getElementById('tab-sub').classList.toggle('active', mode === 'REMOVE');
        
        const btn = document.getElementById('btn-save');
        const weightSection = document.getElementById('weight-section');
        
        if (mode === 'ADD') {
            btn.style.background = '#3498db';
            btn.innerText = 'ДОДАТИ НА СКЛАД';
            weightSection.style.display = 'block';
        } else {
            btn.style.background = '#e74c3c';
            btn.innerText = 'СПИСАТИ ЗІ СКЛАДУ';
            weightSection.style.display = 'none';
        }
    }

    function sendData() {
        const d = document.getElementById('diameter').value;
        const c = document.getElementById('count').value;
        const w = document.getElementById('weight').value || "0";
        
        // Формуємо спец-рядок для бота
        const message = `${mode} ${d} КІЛЬКІСТЬ ${c} ВАГА ${w}`;
        tg.sendData(message);
    }
</script>

</body>
</html>
