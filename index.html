<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tires CRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h3 { text-align: center; color: #248bcf; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 14px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .result-box { background: #eef7ff; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #248bcf; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total { font-size: 18px; font-weight: bold; color: #248bcf; }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
        button:active { background: #1a6fa3; }
    </style>
</head>
<body>
    <div class="card">
        <h3>📦 Прийом коліс</h3>
        
        <label>Діаметр (R):</label>
        <select id="diameter" onchange="calculate()">
            <option value="13" data-weight="6.5">R13 (~6.5 кг)</option>
            <option value="14" data-weight="7.5">R14 (~7.5 кг)</option>
            <option value="15" data-weight="8.8">R15 (~8.8 кг)</option>
            <option value="16" data-weight="10.5">R16 (~10.5 кг)</option>
            <option value="17" data-weight="12.0">R17 (~12.0 кг)</option>
            <option value="18" data-weight="13.5">R18 (~13.5 кг)</option>
            <option value="20" data-weight="16.0">R20 (~16.0 кг)</option>
        </select>

        <label>Кількість (шт):</label>
        <input type="number" id="count" value="1" min="1" oninput="calculate()">

        <div class="result-box">
            <div class="result-item">
                <span>Вага одного:</span>
                <span id="single-weight">6.5 кг</span>
            </div>
            <div class="result-item total">
                <span>ЗАГАЛЬНА ВАГА:</span>
                <span id="total-weight">6.5 кг</span>
            </div>
        </div>

        <button onclick="sendData()">💾 ЗБЕРЕГТИ В БАЗУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function calculate() {
            const select = document.getElementById('diameter');
            const count = document.getElementById('count').value || 0;
            const weight = select.options[select.selectedIndex].getAttribute('data-weight');
            const total = (weight * count).toFixed(1);
            
            document.getElementById('single-weight').innerText = weight + " кг";
            document.getElementById('total-weight').innerText = total + " кг";
        }

        function sendData() {
            const diam = document.getElementById('diameter').value;
            const count = document.getElementById('count').value;
            const weight = document.getElementById('total-weight').innerText.replace(' кг', '');

            // Формуємо рядок: ПРИЙОМ R15 КІЛЬКІСТЬ 4 ВАГА 35.2
            const message = `ПРИЙОМ R${diam} КІЛЬКІСТЬ ${count} ВАГА ${weight}`;
            
            tg.sendData(message);
            tg.close();
        }
    </script>
</body>
</html>
